# Phase 3: Communication-efficient training with LoRA
# Inherits from base_config.yaml

fl:
  algorithm: "fedavg"
  num_rounds: 50
  clients_per_round: 3

peft:
  method: "lora"
  lora:
    r: 8
    alpha: 16
    dropout: 0.1
    target_modules:
      - "query"
      - "value"

training:
  local_epochs: 5
  learning_rate: 1.0e-4

logging:
  experiment_name: "peft_lora_r8"
