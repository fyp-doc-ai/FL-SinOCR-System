# Phase 3: Communication-efficient training with adapter modules
# Inherits from base_config.yaml

fl:
  algorithm: "fedavg"
  num_rounds: 50
  clients_per_round: 3

peft:
  method: "adapter"
  adapter:
    bottleneck_dim: 64
    adapter_dropout: 0.1

training:
  local_epochs: 5
  learning_rate: 1.0e-4

logging:
  experiment_name: "peft_adapter_dim64"
